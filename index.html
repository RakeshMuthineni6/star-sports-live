<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SportSync Live</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --bg: #051412; --card: #0e2522; --accent: #f7d417; --text: #bfc9c7; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20000;
            transition: opacity 0.5s ease-out;
        }
        .splash-logo { width: 120px; height: 120px; border-radius: 25px; box-shadow: 0 0 30px rgba(247, 212, 23, 0.4); margin-bottom: 20px; border: 2px solid var(--accent); object-fit: cover; }
        .splash-name { font-size: 26px; font-weight: bold; color: white; letter-spacing: 1px; }
        .splash-version { position: absolute; bottom: 40px; font-size: 13px; color: var(--text); }
        .loader-dot { width: 45px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 15px; position: relative; overflow: hidden; }
        .loader-dot::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        /* --- UI HEADER --- */
        .topbar { background: var(--bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .topbar h4 { font-size: 20px; font-weight: bold; margin: 0; }
        .top-icons i { font-size: 18px; cursor: pointer; transition: 0.2s; padding: 5px; }

        .search-container { display: none; padding: 10px 15px; background: var(--bg); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #searchInput { width: 100%; padding: 10px 18px; border-radius: 25px; border: 1px solid #1c3631; background: var(--card); color: white; outline: none; }

        /* --- FILTERS & CARDS --- */
        .filters { display: flex; padding: 5px 15px 15px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .f-btn { background: var(--card); border: 1.2px solid #1c3631; color: white; padding: 6px 15px; border-radius: 25px; font-size: 13px; white-space: nowrap; cursor: pointer; display: flex; align-items: center; }
        .f-btn.active { border-color: var(--accent); background: #1c3a35; }
        .badge-count { background: #e50914; border-radius: 50%; padding: 1px 6px; font-size: 10px; margin-left: 6px; border: 1px solid white; }

        .match-card { background: var(--card); margin: 12px 15px; border-radius: 15px; padding: 18px; border: 1px solid #1c3631; box-shadow: 0 4px 10px rgba(0,0,0,0.3); opacity: 0; transform: translateY(10px); transition: 0.4s ease-out; cursor: pointer; }
        .match-card:active { transform: scale(0.98); background: #132b28; }
        .match-card.show { opacity: 1; transform: translateY(0); }
        .m-category { font-size: 11px; color: var(--text); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; }
        .teams-container { display: flex; justify-content: space-between; align-items: center; text-align: center; }
        .team-info img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #ffffff11; margin-bottom: 8px; background: #000; object-fit: cover; }
        .team-info div { font-weight: bold; font-size: 14px; }
        .vs-divider { font-weight: 800; font-size: 20px; color: white; }
        
        /* --- UPDATED LIVE TAG (RED ONLY FOR TEXT) --- */
        .live-tag { 
            background: #e50914; 
            color: white;
            font-size: 10px; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            animation: blink 1.2s infinite; 
        }
        .live-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .watch-btn { background: var(--accent); color: black; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; font-size: 12px; }

        /* --- LINK SELECTION OVERLAY --- */
        #link-selection-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 15000; animation: fadeIn 0.3s;
        }
        .link-container { padding: 30px 20px; }
        .link-row {
            background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 12px;
            display: flex; align-items: center; border: 1px solid #1c3631; cursor: pointer;
        }
        .link-row:active { background: #1c3a35; }
        .link-icon { color: var(--accent); font-size: 20px; margin-right: 20px; }
        .link-text { font-weight: bold; font-size: 16px; }
        .link-sub { display: block; font-size: 11px; color: var(--accent); }

        /* --- PLAYER --- */
        #player-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; }
        .v-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: auto; max-height: 100%; }

        .gesture-zone { position: absolute; top: 0; width: 40%; height: 100%; z-index: 20005; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        .p-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); display: flex; flex-direction: column; justify-content: space-between; z-index: 20010; transition: 0.4s; pointer-events: none; }
        .p-ui.hide { opacity: 0; }
        .p-top, .p-mid i, .p-bottom { pointer-events: auto; }
        .p-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .p-mid { display: flex; justify-content: center; gap: 60px; font-size: 45px; color: white; align-items: center; }
        .p-bottom { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }

        .gesture-box { position: absolute; top: 50%; transform: translateY(-50%); width: 45px; height: 160px; background: rgba(0,0,0,0.6); border-radius: 30px; display: none; flex-direction: column-reverse; align-items: center; padding: 12px; z-index: 20020; pointer-events: none; }
        .bar-fill { width: 6px; background: var(--accent); border-radius: 3px; height: 0%; transition: 0.1s; }
        #br-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 9999; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="br-mask"></div>

<div id="splash-screen">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGEMIb2NLYINkRimbJUxmjfY_GeETgfph0hH2csK7sYmxC4upohieqkyB-43fg_HoQmgHhp0aNSLy2aGfy_fJI7uIReIAqWMfC8T1L65oTbMMAaRDBKwcLDxSM5Fi9SjvGyGVab4BGC85pmFFnpnXIyeOsd3hcNs5Vg0Zz6msAGXX8HUg7OUOac_skmn8/s2048/Gemini_Generated_Image_a89yqoa89yqoa89y.png" class="splash-logo" alt="App Icon">
    <div class="splash-name">SportSync Live</div>
    <div class="loader-dot"></div>
    <div class="splash-version">Version 1.0 (PRO)</div>
</div>

<div id="app-view">
    <div class="topbar">
        <h4>SportSync Live</h4>
        <div class="top-icons">
            <i class="fa-solid fa-share-nodes me-3" onclick="shareApp()"></i>
            <i class="fa-solid fa-rotate-right me-3" onclick="refreshData()"></i>
            <i class="fa-solid fa-magnifying-glass" onclick="toggleSearch()"></i>
        </div>
    </div>

    <div class="search-container" id="searchBox">
        <input type="text" id="searchInput" placeholder="Search matches..." onkeyup="searchFn()">
    </div>
    
    <div class="filters">
        <div class="f-btn active" onclick="filterData('All', this)">All <span class="badge-count" id="c-all">0</span></div>
        <div class="f-btn" onclick="filterData('Cricket', this)">Cricket <span class="badge-count" id="c-cricket">0</span></div>
        <div class="f-btn" onclick="filterData('IPL', this)">IPL <span class="badge-count" id="c-ipl">0</span></div>
    </div>

    <div id="match-list"></div>
</div>

<div id="link-selection-overlay">
    <div class="topbar">
        <div class="d-flex align-items-center">
            <i class="fa-solid fa-arrow-left me-3" onclick="closeLinkOverlay()"></i>
            <h4 class="m-0" id="selection-title">SportSync Live</h4>
        </div>
    </div>
    <div class="link-container" id="link-list-area"></div>
</div>

<div id="player-layer">
    <div class="v-wrap" id="v-container">
        <video id="main-video" playsinline></video>
        <div id="left-zone" class="gesture-zone"></div>
        <div id="right-zone" class="gesture-zone"></div>
        <div id="bright-box" class="gesture-box" style="left: 20px;"><div class="bar-fill" id="b-fill"></div><i class="fa-solid fa-sun mt-2"></i></div>
        <div id="vol-box" class="gesture-box" style="right: 20px;"><div class="bar-fill" id="v-fill"></div><i class="fa-solid fa-volume-high mt-2"></i></div>
        <div class="p-ui" id="player-controls">
            <div class="p-top">
                <div class="d-flex align-items-center"><i class="fa-solid fa-arrow-left me-3" onclick="closePlayer()"></i><span id="video-title" style="font-weight: 600;">HD Stream</span></div>
                <i class="fa-solid fa-lock-open" id="lock-icon" onclick="toggleLock(event)"></i>
            </div>
            <div class="p-mid">
                <i class="fa-solid fa-rotate-left" style="font-size: 30px;" onclick="skip(-10, event)"></i>
                <i class="fa-solid fa-play" id="play-pause-btn" onclick="togglePlay(event)"></i>
                <i class="fa-solid fa-rotate-right" style="font-size: 30px;" onclick="skip(10, event)"></i>
            </div>
            <div class="p-bottom">
                <input type="range" id="seek-slider" value="0" style="width:100%; accent-color:#f7d417;">
                <div class="d-flex justify-content-between mt-2" style="font-size: 12px; color: #ddd;">
                    <span id="time-label">00:00 / 00:00</span>
                    <i class="fa-solid fa-expand" onclick="toggleFS(event)"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const LIVE_STREAM_URL = 'https://mxonlive.wuaze.com/AYNAWEB/play.php?id=f064e069-8861-43d5-ac79-828b029a50a1';
    const SHARE_MSG = "Watch Live Cricket & IPL in HD! Download SportSync Live App now: https://play.google.com/store/apps/details?id=starsports.aplitob";

    const allMatches = [
        { cat: "Cricket", title: "T20 International", t1: "New Zealand", t1_img: "https://upload.wikimedia.org/wikipedia/commons/3/3e/Flag_of_New_Zealand.svg", t2: "South Africa", t2_img: "https://upload.wikimedia.org/wikipedia/commons/a/af/Flag_of_South_Africa.svg",
          links: [
              { name: "English 1 WILLOW ( WORLDWIDE 🌐 )", url: LIVE_STREAM_URL },
              { name: "English 2 FanCode ( WORLDWIDE 🌐 )", url: LIVE_STREAM_URL },
              { name: "Hindi HD ( FAST STREAM ⚡ )", url: LIVE_STREAM_URL }
          ]
        },
        { cat: "IPL", title: "IPL Season 2026", t1: "RCB", t1_img: "https://upload.wikimedia.org/wikipedia/en/thumb/2/2b/Royal_Challengers_Bangalore_2020_Logo.svg/1200px-Royal_Challengers_Bangalore_2020_Logo.svg.png", t2: "SRH", t2_img: "https://upload.wikimedia.org/wikipedia/en/thumb/8/81/Sunrisers_Hyderabad.svg/1200px-Sunrisers_Hyderabad.svg.png",
          links: [
              { name: "Link 1 - Star Sports HD", url: LIVE_STREAM_URL },
              { name: "Link 2 - JioCinema Pro", url: LIVE_STREAM_URL },
              { name: "Link 3 - Willow Cricket", url: LIVE_STREAM_URL }
          ]
        }
    ];

    const video = document.getElementById('main-video');
    const playerLayer = document.getElementById('player-layer');
    const pUI = document.getElementById('player-controls');
    const linkOverlay = document.getElementById('link-selection-overlay');
    let hls = null, isLocked = false, brightness = 1.0;

    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; refreshData(); }, 500);
        }, 3000);
    });

    function renderUI(data) {
        const list = document.getElementById('match-list');
        list.innerHTML = data.map((m, idx) => `
            <div class="match-card" onclick="openLinkSelection(${idx})">
                <div class="m-category">${m.cat} | ${m.title}</div>
                <div class="teams-container">
                    <div class="team-info"><img src="${m.t1_img}"><div>${m.t1}</div></div>
                    <div class="vs-divider">VS</div>
                    <div class="team-info"><img src="${m.t2_img}"><div>${m.t2}</div></div>
                </div>
                <div class="footer-row">
                    <div class="live-tag">Live</div>
                    <button class="watch-btn">▶ WATCH NOW</button>
                </div>
            </div>
        `).join('');
        setTimeout(() => document.querySelectorAll('.match-card').forEach(c => c.classList.add('show')), 100);
        updateCounts();
    }

    function openLinkSelection(index) {
        const match = allMatches[index];
        document.getElementById('selection-title').innerText = match.t1 + " vs " + match.t2;
        const linkList = document.getElementById('link-list-area');
        linkList.innerHTML = match.links.map(link => `
            <div class="link-row" onclick="playStream('${link.url}', '${link.name}')">
                <i class="fa-solid fa-chevron-right link-icon"></i>
                <div><span class="link-text">${link.name}</span><span class="link-sub">Link</span></div>
            </div>
        `).join('');
        linkOverlay.style.display = 'block';
    }
    function closeLinkOverlay() { linkOverlay.style.display = 'none'; }
    function playStream(url, title) { closeLinkOverlay(); playerLayer.style.display = 'block'; document.getElementById('video-title').innerText = title; if (Hls.isSupported() && url.includes('.m3u8')) { if(hls) hls.destroy(); hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); } else { video.src = url; video.play().catch(()=>{}); } showUI(); }
    function shareApp() { if (navigator.share) { navigator.share({ title: 'SportSync Live', text: SHARE_MSG }).catch(console.error); } }
    function toggleSearch() { const s = document.getElementById('searchBox'); s.style.display = (s.style.display === 'block') ? 'none' : 'block'; if(s.style.display === 'block') document.getElementById('searchInput').focus(); }
    function hideSearch() { const s = document.getElementById('searchBox'); s.style.display = 'none'; document.getElementById('searchInput').value = ''; }
    function filterData(cat, btn) { hideSearch(); document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); const filtered = cat === 'All' ? allMatches : allMatches.filter(m => m.cat === cat); renderUI(filtered); }
    function refreshData() { hideSearch(); document.getElementById('match-list').innerHTML = "<div class='text-center mt-5'><div class='spinner-border text-warning'></div></div>"; setTimeout(() => renderUI(allMatches), 800); }
    function searchFn() { const val = document.getElementById('searchInput').value.toLowerCase(); const filtered = allMatches.filter(m => m.t1.toLowerCase().includes(val) || m.t2.toLowerCase().includes(val)); renderUI(filtered); }
    function updateCounts() { document.getElementById('c-all').innerText = allMatches.length; document.getElementById('c-cricket').innerText = allMatches.filter(m => m.cat === 'Cricket').length; document.getElementById('c-ipl').innerText = allMatches.filter(m => m.cat === 'IPL').length; }
    function closePlayer() { playerLayer.style.display = 'none'; video.pause(); video.src = ""; }
    function togglePlay(e) { e.stopPropagation(); video.paused ? video.play() : video.pause(); updatePlayBtn(); }
    function updatePlayBtn() { document.getElementById('play-pause-btn').className = video.paused ? 'fa-solid fa-play' : 'fa-solid fa-pause'; }
    function skip(v, e) { e.stopPropagation(); video.currentTime += v; }
    let startY, startVal;
    document.getElementById('left-zone').addEventListener('touchstart', e => { if(isLocked) return; startY = e.touches[0].pageY; startVal = brightness; document.getElementById('bright-box').style.display = 'flex'; });
    document.getElementById('left-zone').addEventListener('touchmove', e => { if(isLocked) return; let delta = (startY - e.touches[0].pageY) / 150; brightness = Math.min(Math.max(startVal + delta, 0), 1); document.getElementById('br-mask').style.opacity = 1 - brightness; document.getElementById('b-fill').style.height = (brightness * 100) + '%'; });
    document.getElementById('right-zone').addEventListener('touchstart', e => { if(isLocked) return; startY = e.touches[0].pageY; startVal = video.volume; document.getElementById('vol-box').style.display = 'flex'; });
    document.getElementById('right-zone').addEventListener('touchmove', e => { if(isLocked) return; let delta = (startY - e.touches[0].pageY) / 150; video.volume = Math.min(Math.max(startVal + delta, 0), 1); document.getElementById('v-fill').style.height = (video.volume * 100) + '%'; });
    document.querySelectorAll('.gesture-zone').forEach(zone => { zone.addEventListener('touchend', () => { document.querySelectorAll('.gesture-box').forEach(b => b.style.display = 'none'); }); zone.addEventListener('click', () => { if(!isLocked) pUI.classList.toggle('hide'); showUI(); }); });
    function showUI() { pUI.classList.remove('hide'); clearTimeout(window.uTimer); if(!video.paused) window.uTimer = setTimeout(() => pUI.classList.add('hide'), 3500); }
    function toggleLock(e) { e.stopPropagation(); isLocked = !isLocked; document.getElementById('lock-icon').className = isLocked ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open'; pUI.classList.toggle('hide', isLocked); }
    video.addEventListener('timeupdate', () => { const cur = formatTime(video.currentTime); const dur = formatTime(video.duration); document.getElementById('time-label').innerText = `${cur} / ${dur}`; document.getElementById('seek-slider').value = (video.currentTime / video.duration) * 100 || 0; });
    function formatTime(s) { if(isNaN(s)) return "00:00"; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m < 10 ? '0'+m : m}:${sec < 10 ? '0'+sec : sec}`; }
    function toggleFS(e) { e.stopPropagation(); if(!document.fullscreenElement) document.getElementById('v-container').requestFullscreen(); else document.exitFullscreen(); }
    window.onload = refreshData;
</script>
</body>
</html>
