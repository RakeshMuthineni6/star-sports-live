<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SportSync Live</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    
    <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --bg: #051412; --card: #0e2522; --accent: #f7d417; --text: #bfc9c7; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20000; transition: opacity 0.5s; }
        .splash-logo { width: 120px; height: 120px; border-radius: 25px; box-shadow: 0 0 30px rgba(247, 212, 23, 0.4); margin-bottom: 20px; border: 2px solid var(--accent); object-fit: cover; }
        .loader-dot { width: 45px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 15px; position: relative; overflow: hidden; }
        .loader-dot::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        /* UI HEADER */
        .topbar { background: var(--bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .topbar h4 { font-size: 20px; font-weight: bold; margin: 0; }
        .top-icons i { font-size: 18px; cursor: pointer; padding: 5px; }

        .search-container { display: none; padding: 10px 15px; background: var(--bg); animation: slideDown 0.3s ease-out; }
        #searchInput { width: 100%; padding: 10px 18px; border-radius: 25px; border: 1px solid #1c3631; background: var(--card); color: white; outline: none; }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .filters { display: flex; padding: 5px 15px 15px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .f-btn { background: var(--card); border: 1.2px solid #1c3631; color: white; padding: 6px 15px; border-radius: 25px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .f-btn.active { border-color: var(--accent); background: #1c3a35; }
        .badge-count { background: #e50914; border-radius: 50%; padding: 1px 6px; font-size: 10px; margin-left: 6px; border: 1px solid white; }

        /* MATCH CARD */
        .match-card { background: var(--card); margin: 12px 15px; border-radius: 15px; padding: 18px; border: 1px solid #1c3631; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        .m-card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; border: 1px solid #1c3631; }
        .teams-container { display: flex; justify-content: space-between; align-items: center; text-align: center; }
        .team-info img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #ffffff11; margin-bottom: 8px; background: #000; object-fit: cover; }
        .vs-divider { font-weight: 800; font-size: 20px; color: white; }
        .live-tag { background: #e50914; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .watch-btn { background: var(--accent); color: black; border: none; padding: 8px 18px; border-radius: 6px; font-weight: bold; font-size: 12px; }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; padding: 20px; overflow-y: auto; }
        .admin-item { background: #0e2522; padding: 12px; border-radius: 8px; border: 1px solid #1c3631; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .link-input-group { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #1c3631; position: relative; }
        .del-link-btn { position: absolute; top: -10px; right: -5px; background: #ff4444; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; border: none; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .form-control, .form-select { background: #0e2522; border: 1px solid #1c3631; color: white; font-size: 14px; margin-top: 5px; }
        label { color: var(--accent); font-size: 12px; margin-top: 12px; font-weight: bold; }

        /* PLAYER & OVERLAYS */
        #player-layer, #link-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; }
        .v-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; max-height: 100%; }
        .p-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); display: flex; flex-direction: column; justify-content: space-between; z-index: 20010; transition: 0.4s; pointer-events: none; }
        .p-ui.hide { opacity: 0; }
        .p-top, .p-mid i, .p-bottom { pointer-events: auto; }
        .p-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .p-mid { display: flex; justify-content: center; gap: 60px; font-size: 45px; color: white; align-items: center; }
        .p-bottom { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .gesture-box { position: absolute; top: 50%; transform: translateY(-50%); width: 45px; height: 160px; background: rgba(0,0,0,0.6); border-radius: 30px; display: none; flex-direction: column-reverse; align-items: center; padding: 12px; z-index: 20020; pointer-events: none; }
        .bar-fill { width: 6px; background: var(--accent); border-radius: 3px; height: 0%; transition: 0.1s; }
        #br-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 19999; opacity: 0; }
        .link-row { background: #0e2522; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #1c3631; display: flex; align-items: center; cursor: pointer; }

        /* CUSTOM SHARE SHEET */
        #share-sheet-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 40000; justify-content: center; align-items: flex-end; }
        #share-sheet { background: #111; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 25px; transform: translateY(100%); transition: transform 0.3s ease-out; }
        #share-sheet-overlay.show { display: flex; }
        #share-sheet-overlay.show #share-sheet { transform: translateY(0); }
        .share-header { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .share-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none !important; }
        .share-icon-w { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; }
        .share-item span { color: #aaa; font-size: 12px; }
        .sh-ws { background-color: #25D366; }
        .sh-tg { background-color: #0088cc; }
        .sh-fb { background-color: #3b5998; }
        .sh-ms { background-color: #0078FF; }
    </style>
</head>
<body onclick="hideSearchOnClick(event)">

<div id="br-mask"></div>

<div id="splash-screen">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGEMIb2NLYINkRimbJUxmjfY_GeETgfph0hH2csK7sYmxC4upohieqkyB-43fg_HoQmgHhp0aNSLy2aGfy_fJI7uIReIAqWMfC8T1L65oTbMMAaRDBKwcLDxSM5Fi9SjvGyGVab4BGC85pmFFnpnXIyeOsd3hcNs5Vg0Zz6msAGXX8HUg7OUOac_skmn8/s2048/Gemini_Generated_Image_a89yqoa89yqoa89y.png" class="splash-logo">
    <div style="font-weight:bold; font-size:24px; margin-top:10px;">SportSync Live</div>
    <div class="loader-dot"></div>
</div>

<div id="app-view">
    <div class="topbar">
        <h4>SportSync Live</h4>
        <div class="top-icons">
            <i class="fa-solid fa-share-nodes me-3" onclick="openShareSheet()"></i>
            <i class="fa-solid fa-rotate-right me-3" onclick="location.reload()"></i>
            <i class="fa-solid fa-magnifying-glass me-3" id="searchTrigger" onclick="toggleSearch(event)"></i>
            <i class="fa-solid fa-lock" onclick="openAdmin()"></i>
        </div>
    </div>
    <div class="search-container" id="searchBox" onclick="event.stopPropagation()"><input type="text" id="searchInput" placeholder="Search matches..." onkeyup="searchFn()"></div>
    
    <div class="filters">
        <div class="f-btn active" onclick="filterData('All', this)">All <span class="badge-count" id="c-all">0</span></div>
        <div class="f-btn" onclick="filterData('Cricket', this)">Cricket <span class="badge-count" id="c-cricket">0</span></div>
        <div class="f-btn" onclick="filterData('IPL', this)">IPL <span class="badge-count" id="c-ipl">0</span></div>
    </div>
    <div id="match-list"></div>
</div>

<div id="share-sheet-overlay" onclick="closeShareSheet()">
    <div id="share-sheet" onclick="event.stopPropagation()">
        <div class="share-header"><h5>Share App Via</h5><i class="fa-solid fa-times fs-4" onclick="closeShareSheet()"></i></div>
        <div class="share-grid">
            <a href="#" class="share-item" id="share-wa" target="_blank"><div class="share-icon-w sh-ws"><i class="fa-brands fa-whatsapp"></i></div><span>WhatsApp</span></a>
            <a href="#" class="share-item" id="share-tg" target="_blank"><div class="share-icon-w sh-tg"><i class="fa-brands fa-telegram"></i></div><span>Telegram</span></a>
            <a href="#" class="share-item" id="share-fb" target="_blank"><div class="share-icon-w sh-fb"><i class="fa-brands fa-facebook-f"></i></div><span>Facebook</span></a>
            <a href="#" class="share-item" id="share-ms" target="_blank"><div class="share-icon-w sh-ms"><i class="fa-brands fa-facebook-messenger"></i></div><span>Messenger</span></a>
        </div>
    </div>
</div>

<div id="link-overlay">
    <div class="topbar"><i class="fa-solid fa-arrow-left" onclick="closeLink()"></i><h4 id="link-title">Server Selection</h4><i></i></div>
    <div id="link-area" class="mt-4"></div>
</div>

<div id="admin-panel">
    <div class="d-flex justify-content-between align-items-center mb-3 text-warning"><h4>Admin Dashboard</h4><button class="btn btn-sm btn-danger" onclick="closeAdmin()">X</button></div>
    <div id="admin-items-list" class="mb-3"></div>
    <hr style="border-color:#333">
    <h5 id="form-title" class="text-accent">Add New Match</h5>
    <input type="hidden" id="edit-id" value="">
    <label>Select Category*</label>
    <select id="m-cat" class="form-select"><option value="Cricket">Cricket</option><option value="IPL">IPL</option></select>
    <label>Match Card Image URL</label>
    <input type="text" id="m-card-url" class="form-control" placeholder="Paste Image URL">
    <div class="row">
        <div class="col-6"><label>Team 1 Name*</label><input type="text" id="m-t1" class="form-control"><label>Team 1 Logo URL</label><input type="text" id="m-t1-url" class="form-control"></div>
        <div class="col-6"><label>Team 2 Name*</label><input type="text" id="m-t2" class="form-control"><label>Team 2 Logo URL</label><input type="text" id="m-t2-url" class="form-control"></div>
    </div>
    <label>Streaming Links*</label>
    <div id="links-container"><div class="link-input-group"><div class="row g-2"><div class="col-5"><input type="text" class="form-control s-name" placeholder="Server"></div><div class="col-7"><input type="text" class="form-control s-url" placeholder="URL"></div></div></div></div>
    <button class="btn btn-sm btn-outline-warning mt-2 w-100" onclick="addNewLinkField()">+ Add More Servers</button>
    <div class="d-flex align-items-center mt-3"><label class="m-0 me-3">Schedule Match:</label><input type="datetime-local" id="m-time" class="form-control" style="width: auto;"></div>
    <div class="form-check form-switch mt-3"><input class="form-check-input" type="checkbox" id="m-live"><label class="form-check-label text-white">Live Match Mode</label></div>
    <div class="mt-4 d-flex gap-2"><button class="btn btn-warning flex-grow-1 fw-bold" onclick="saveMatch()" id="save-btn">SAVE TO CLOUD</button><button class="btn btn-danger fw-bold" id="cancel-edit-btn" style="display:none;" onclick="resetAdminForm()">CANCEL</button></div>
</div>

<div id="player-layer">
    <div class="v-wrap" id="v-container">
        <video id="main-video" playsinline></video>
        <div id="left-zone" style="position:absolute;left:0;width:40%;height:100%;z-index:20005;"></div>
        <div id="right-zone" style="position:absolute;right:0;width:40%;height:100%;z-index:20005;"></div>
        <div id="bright-box" class="gesture-box" style="left:20px;"><div class="bar-fill" id="b-fill"></div><i class="fa-solid fa-sun mt-2"></i></div>
        <div id="vol-box" class="gesture-box" style="right:20px;"><div class="bar-fill" id="v-fill"></div><i class="fa-solid fa-volume-high mt-2"></i></div>
        <div class="p-ui" id="player-controls">
            <div class="p-top"><i class="fa-solid fa-arrow-left" onclick="closePlayer()"></i><span id="v-title">SportSync Live</span><i class="fa-solid fa-lock-open" id="lock-btn" onclick="toggleLock(event)"></i></div>
            <div class="p-mid"><i class="fa-solid fa-rotate-left" onclick="skip(-10, event)"></i><i class="fa-solid fa-play" id="p-play" onclick="togglePlay(event)"></i><i class="fa-solid fa-rotate-right" onclick="skip(10, event)"></i></div>
            <div class="p-bottom"><input type="range" id="seek-slider" min="0" max="100" step="0.1" style="width:100%; accent-color:#f7d417;"><div class="d-flex justify-content-between mt-2" style="font-size:12px;"><span id="time-lbl">00:00 / 00:00</span><i class="fa-solid fa-expand" onclick="toggleFS(event)"></i></div></div>
        </div>
    </div>
</div>

<script>
    // Firebase Config (Updated with Database)
    const firebaseConfig = {
      apiKey: "AIzaSyDid9PyTmzKwrM0wLERsKIOf2GEdu9tp5M",
      authDomain: "sportsynclive-3ef2c.firebaseapp.com",
      projectId: "sportsynclive-3ef2c",
      storageBucket: "sportsynclive-3ef2c.firebasestorage.app",
      messagingSenderId: "433748656595",
      appId: "1:433748656595:web:ae73836ff99dfae723ef26",
      measurementId: "G-VBQ232G14H",
      databaseURL: "https://sportsynclive-3ef2c-default-rtdb.firebaseio.com" // Check this URL in your console
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let matchDatabase = [];
    let currentFilter = 'All';

    // --- REALTIME DATA SYNC ---
    database.ref('matches').on('value', (snapshot) => {
        const data = snapshot.val();
        matchDatabase = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
        refreshData();
        renderAdminList();
    });

    const video = document.getElementById('main-video');
    let hls = null, isLocked = false, brightness = 1.0;

    window.onload = () => { setTimeout(() => { document.getElementById('splash-screen').style.display='none'; }, 2500); };

    function openShareSheet() {
        const appUrl = "https://play.google.com/store/apps/details?id=starsports.aplitob";
        const shareText = encodeURIComponent(`Watch Live Cricket & IPL in HD! Download SportSync Live App now:\n${appUrl}`);
        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${shareText}`;
        document.getElementById('share-tg').href = `https://telegram.me/share/url?url=${encodeURIComponent(appUrl)}&text=${encodeURIComponent('Watch Live Cricket & IPL in HD!')}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(appUrl)}`;
        document.getElementById('share-ms').href = `fb-messenger://share/?link=${encodeURIComponent(appUrl)}`;
        document.getElementById('share-sheet-overlay').classList.add('show');
    }
    function closeShareSheet() { document.getElementById('share-sheet-overlay').classList.remove('show'); }

    // Admin Functions
    function openAdmin() { if(prompt("Password:") === "Tecra@123") { document.getElementById('admin-panel').style.display='block'; } }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; resetAdminForm(); }
    
    function saveMatch() {
        const id = document.getElementById('edit-id').value;
        let links = [];
        document.querySelectorAll('.link-input-group').forEach(g => {
            const n = g.querySelector('.s-name').value, u = g.querySelector('.s-url').value;
            if(n && u) links.push({name: n, url: u});
        });

        const matchData = {
            cat: document.getElementById('m-cat').value,
            t1: document.getElementById('m-t1').value,
            t2: document.getElementById('m-t2').value,
            t1_img: document.getElementById('m-t1-url').value,
            t2_img: document.getElementById('m-t2-url').value,
            card: document.getElementById('m-card-url').value,
            links,
            time: document.getElementById('m-time').value,
            isLive: document.getElementById('m-live').checked
        };

        if(id) {
            database.ref('matches/' + id).update(matchData);
        } else {
            database.ref('matches').push(matchData);
        }
        resetAdminForm();
    }

    function deleteMatch(id) { if(confirm("Delete from Cloud?")) database.ref('matches/' + id).remove(); }
    
    function editMatch(id) {
        const m = matchDatabase.find(item => item.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('form-title').innerText = "Edit Match";
        document.getElementById('save-btn').innerText = "UPDATE CLOUD";
        document.getElementById('cancel-edit-btn').style.display = "block";
        document.getElementById('m-cat').value = m.cat;
        document.getElementById('m-t1').value = m.t1;
        document.getElementById('m-t2').value = m.t2;
        document.getElementById('m-t1-url').value = m.t1_img;
        document.getElementById('m-t2-url').value = m.t2_img;
        document.getElementById('m-card-url').value = m.card;
        document.getElementById('m-time').value = m.time;
        document.getElementById('m-live').checked = m.isLive;
        const container = document.getElementById('links-container');
        container.innerHTML = m.links.map((l, idx) => `<div class="link-input-group">${idx > 0 ? `<button class="del-link-btn" onclick="this.parentElement.remove()">×</button>` : ''}<div class="row g-2"><div class="col-5"><input type="text" class="form-control s-name" value="${l.name}"></div><div class="col-7"><input type="text" class="form-control s-url" value="${l.url}"></div></div></div>`).join('');
    }

    function resetAdminForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('form-title').innerText = "Add New Match";
        document.getElementById('save-btn').innerText = "SAVE TO CLOUD";
        document.getElementById('cancel-edit-btn').style.display = "none";
        document.getElementById('m-t1').value = ""; document.getElementById('m-t2').value = "";
        document.getElementById('m-t1-url').value = ""; document.getElementById('m-t2-url').value = "";
        document.getElementById('m-card-url').value = ""; document.getElementById('m-time').value = "";
        document.getElementById('m-live').checked = false;
        document.getElementById('links-container').innerHTML = `<div class="link-input-group"><div class="row g-2"><div class="col-5"><input type="text" class="form-control s-name" placeholder="Server"></div><div class="col-7"><input type="text" class="form-control s-url" placeholder="URL"></div></div></div>`;
    }

    function renderAdminList() {
        const list = document.getElementById('admin-items-list');
        list.innerHTML = matchDatabase.map((m) => `<div class="admin-item"><span>${m.t1} vs ${m.t2}</span><div><i class="fa-solid fa-pen-to-square text-warning me-3" onclick="editMatch('${m.id}')"></i><i class="fa-solid fa-trash text-danger" onclick="deleteMatch('${m.id}')"></i></div></div>`).join('');
    }

    function refreshData() {
        let filtered = currentFilter === 'All' ? matchDatabase : matchDatabase.filter(m => m.cat === currentFilter);
        const list = document.getElementById('match-list');
        list.innerHTML = filtered.map((m) => `
            <div class="match-card" onclick="openLinks('${m.id}')">
                ${m.card ? `<img src="${m.card}" class="m-card-img">` : ''}
                <div class="teams-container">
                    <div class="team-info"><img src="${m.t1_img || ''}"><div>${m.t1}</div></div>
                    <div class="vs-divider">VS</div>
                    <div class="team-info"><img src="${m.t2_img || ''}"><div>${m.t2}</div></div>
                </div>
                <div class="footer-row">
                    ${m.isLive ? '<div class="live-tag">Live</div>' : `<div style="font-size:11px;color:var(--accent)">${m.time.replace('T', ' ')}</div>`}
                    <button class="watch-btn">▶ WATCH NOW</button>
                </div>
            </div>`).join('');
        updateCounts();
    }

    function openLinks(id) {
        const m = matchDatabase.find(item => item.id === id);
        document.getElementById('link-title').innerText = m.t1 + " vs " + m.t2;
        document.getElementById('link-area').innerHTML = m.links.map(l => `<div class="link-row" onclick="playStream('${l.url}', '${m.t1} vs ${m.t2}')"><i class="fa-solid fa-play me-3 text-warning"></i><span>${l.name}</span></div>`).join('');
        document.getElementById('link-overlay').style.display = 'block';
    }

    // --- PLAYER & SEARCH LOGIC ---
    function toggleSearch(e) { e.stopPropagation(); let s = document.getElementById('searchBox'); s.style.display = (s.style.display==='block')?'none':'block'; if(s.style.display==='block') document.getElementById('searchInput').focus(); }
    function hideSearchOnClick(e) { let s = document.getElementById('searchBox'); if(s.style.display === 'block') s.style.display = 'none'; }
    function closeLink() { document.getElementById('link-overlay').style.display = 'none'; }
    function playStream(url, title) { closeLink(); document.getElementById('player-layer').style.display = 'block'; document.getElementById('v-title').innerText = title; if (Hls.isSupported()) { if(hls) hls.destroy(); hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); } else { video.src = url; video.play(); } }
    function closePlayer() { document.getElementById('player-layer').style.display = 'none'; video.pause(); }
    function togglePlay(e) { e.stopPropagation(); video.paused ? video.play() : video.pause(); }
    function skip(v, e) { e.stopPropagation(); video.currentTime += v; }
    function toggleFS(e) { e.stopPropagation(); if(!document.fullscreenElement) document.getElementById('v-container').requestFullscreen(); else document.exitFullscreen(); }
    function toggleLock(e) { e.stopPropagation(); isLocked = !isLocked; document.getElementById('lock-btn').className = isLocked ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open'; document.getElementById('player-controls').classList.toggle('hide', isLocked); }
    function filterData(c, btn) { currentFilter = c; document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshData(); }
    function updateCounts() { document.getElementById('c-all').innerText = matchDatabase.length; document.getElementById('c-cricket').innerText = matchDatabase.filter(m => m.cat === 'Cricket').length; document.getElementById('c-ipl').innerText = matchDatabase.filter(m => m.cat === 'IPL').length; }
    function addNewLinkField() { const div = document.createElement('div'); div.className = "link-input-group"; div.innerHTML = `<button class="del-link-btn" onclick="this.parentElement.remove()">×</button><div class="row g-2"><div class="col-5"><input type="text" class="form-control s-name" placeholder="Server"></div><div class="col-7"><input type="text" class="form-control s-url" placeholder="URL"></div></div>`; document.getElementById('links-container').appendChild(div); }
    function searchFn() { let val = document.getElementById('searchInput').value.toLowerCase(); let filtered = matchDatabase.filter(m => (m.t1.toLowerCase().includes(val) || m.t2.toLowerCase().includes(val)) && (currentFilter === 'All' || m.cat === currentFilter)); document.getElementById('match-list').innerHTML = filtered.map((m) => `<div class="match-card" onclick="openLinks('${m.id}')">${m.card ? `<img src="${m.card}" class="m-card-img">` : ''}<div class="teams-container"><div class="team-info"><img src="${m.t1_img || ''}"><div>${m.t1}</div></div><div class="vs-divider">VS</div><div class="team-info"><img src="${m.t2_img || ''}"><div>${m.t2}</div></div></div><div class="footer-row">${m.isLive ? '<div class="live-tag">Live</div>' : `<div style="font-size:11px;color:var(--accent)">${m.time.replace('T', ' ')}</div>`}<button class="watch-btn">▶ WATCH NOW</button></div></div>`).join(''); }

    // GESTURES
    let startY, startV; document.getElementById('left-zone').addEventListener('touchstart', e => { if(isLocked) return; startY = e.touches[0].pageY; startV = brightness; document.getElementById('bright-box').style.display='flex'; }); document.getElementById('left-zone').addEventListener('touchmove', e => { if(isLocked) return; let d = (startY - e.touches[0].pageY)/150; brightness = Math.min(Math.max(startV+d, 0), 1); document.getElementById('br-mask').style.opacity = 1-brightness; document.getElementById('b-fill').style.height = (brightness*100)+'%'; }); document.getElementById('right-zone').addEventListener('touchstart', e => { if(isLocked) return; startY = e.touches[0].pageY; startV = video.volume; document.getElementById('vol-box').style.display='flex'; }); document.getElementById('right-zone').addEventListener('touchmove', e => { if(isLocked) return; let d = (startY - e.touches[0].pageY)/150; video.volume = Math.min(Math.max(startV+d, 0), 1); document.getElementById('v-fill').style.height = (video.volume*100)+'%'; }); document.body.addEventListener('touchend', () => document.querySelectorAll('.gesture-box').forEach(b => b.style.display='none'));
    const seek = document.getElementById('seek-slider'); seek.addEventListener('input', () => { video.currentTime = (seek.value / 100) * video.duration; }); video.addEventListener('timeupdate', () => { seek.value = (video.currentTime / video.duration) * 100 || 0; document.getElementById('time-lbl').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration); document.getElementById('p-play').className = video.paused ? 'fa-solid fa-play' : 'fa-solid fa-pause'; }); function formatTime(s) { if(isNaN(s)) return "00:00"; const m = Math.floor(s/60), sc = Math.floor(s%60); return (m<10?'0'+m:m)+":"+(sc<10?'0'+sc:sc); }
</script>
</body>
</html>
