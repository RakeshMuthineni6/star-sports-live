<script>
    const firebaseConfig = { apiKey: "AIzaSyDid9PyTmzKwrM0wLERsKIOf2GEdu9tp5M", authDomain: "sportsynclive-3ef2c.firebaseapp.com", projectId: "sportsynclive-3ef2c", storageBucket: "sportsynclive-3ef2c.firebasestorage.app", messagingSenderId: "433748656595", appId: "1:433748656595:web:ae73836ff99dfae723ef26", measurementId: "G-VBQ232G14H" };
    firebase.initializeApp(firebaseConfig); firebase.analytics();

    let matchDatabase = JSON.parse(localStorage.getItem('matchVault')) || [];
    let currentFilter = 'All';
    const video = document.getElementById('main-video');
    let hls = null, isLocked = false, brightness = 1.0;

    window.onload = () => { setTimeout(() => { document.getElementById('splash-screen').style.display='none'; refreshData(); }, 2500); };

    function openShareSheet() {
        const appUrl = "https://play.google.com/store/apps/details?id=starsports.aplitob";
        const shareText = encodeURIComponent(`Watch Live Cricket & IPL in HD! Download SportSync Live App now:\n${appUrl}`);
        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${shareText}`;
        document.getElementById('share-tg').href = `https://telegram.me/share/url?url=${encodeURIComponent(appUrl)}&text=${encodeURIComponent('Watch Live Cricket & IPL in HD!')}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(appUrl)}`;
        document.getElementById('share-ms').href = `fb-messenger://share/?link=${encodeURIComponent(appUrl)}`;
        document.getElementById('share-sheet-overlay').classList.add('show');
    }
    function closeShareSheet() { document.getElementById('share-sheet-overlay').classList.remove('show'); }

    function toggleSearch(e) { e.stopPropagation(); let s = document.getElementById('searchBox'); s.style.display = (s.style.display==='block')?'none':'block'; if(s.style.display==='block') document.getElementById('searchInput').focus(); }
    function hideSearchOnClick(e) { let s = document.getElementById('searchBox'); if(s.style.display === 'block') s.style.display = 'none'; }
    function openAdmin() { if(prompt("Password:") === "Tecra@123") { document.getElementById('admin-panel').style.display='block'; renderAdminList(); } }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; resetAdminForm(); }
    
    function renderAdminList() { const list = document.getElementById('admin-items-list'); list.innerHTML = matchDatabase.map((m, i) => `<div class="admin-item"><span>${m.t1} vs ${m.t2}</span><div><i class="fa-solid fa-pen-to-square text-info me-3" onclick="editMatch(${i})"></i><i class="fa-solid fa-trash text-danger" onclick="deleteMatch(${i})"></i></div></div>`).join(''); }
    function deleteMatch(i) { if(confirm("Delete?")) { matchDatabase.splice(i, 1); saveVault(); renderAdminList(); refreshData(); } }
    
    function editMatch(i) { 
        const m = matchDatabase[i]; 
        document.getElementById('edit-index').value = i; 
        document.getElementById('form-title').innerText = "Update Match Entry"; 
        document.getElementById('save-btn').innerText = "PUSH UPDATES"; 
        document.getElementById('cancel-edit-btn').style.display = "block"; 
        document.getElementById('m-cat').value = m.cat; 
        document.getElementById('m-t1').value = m.t1; 
        document.getElementById('m-t2').value = m.t2; 
        document.getElementById('m-time').value = m.time; 
        document.getElementById('m-live').checked = m.isLive;
        document.getElementById('m-card-url').value = m.card.startsWith('data:') ? '' : m.card;
        document.getElementById('m-t1-url').value = m.t1_img.startsWith('data:') ? '' : m.t1_img;
        document.getElementById('m-t2-url').value = m.t2_img.startsWith('data:') ? '' : m.t2_img;
        const container = document.getElementById('links-container'); 
        container.innerHTML = m.links.map((l, idx) => `<div class="link-input-group">${idx > 0 ? `<button class="del-link-btn" onclick="this.parentElement.remove()">×</button>` : ''}<div class="row g-2"><div class="col-5"><input type="text" class="form-control admin-input s-name" value="${l.name}"></div><div class="col-7"><input type="text" class="form-control admin-input s-url" value="${l.url}"></div></div></div>`).join(''); 
        document.getElementById('admin-panel').scrollTo({top: 400, behavior: 'smooth'});
    }

    function addNewLinkField() { const div = document.createElement('div'); div.className = "link-input-group"; div.innerHTML = `<button class="del-link-btn" onclick="this.parentElement.remove()">×</button><div class="row g-2"><div class="col-5"><input type="text" class="form-control admin-input s-name" placeholder="Server"></div><div class="col-7"><input type="text" class="form-control admin-input s-url" placeholder="URL"></div></div>`; document.getElementById('links-container').appendChild(div); }
    
    async function compressImg(file) { return new Promise(resolve => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 250; canvas.getContext('2d').drawImage(img, 0, 0, 400, 250); resolve(canvas.toDataURL('image/jpeg', 0.7)); }; }; }); }
    
    async function getImg(fileId, urlId, oldVal) {
        const file = document.getElementById(fileId).files[0];
        const url = document.getElementById(urlId).value;
        if(file) return await compressImg(file);
        if(url) return url;
        return oldVal || "";
    }

    async function saveMatch() { 
        const idx = parseInt(document.getElementById('edit-index').value); 
        let links = []; 
        document.querySelectorAll('.link-input-group').forEach(g => { 
            const n = g.querySelector('.s-name').value, u = g.querySelector('.s-url').value; 
            if(n && u) links.push({name: n, url: u}); 
        }); 
        if(links.length === 0) return alert("Add Link!"); 
        const oldMatch = idx > -1 ? matchDatabase[idx] : {};
        const mObj = { 
            cat: document.getElementById('m-cat').value, t1: document.getElementById('m-t1').value, t2: document.getElementById('m-t2').value, 
            t1_img: await getImg('m-t1-file', 'm-t1-url', oldMatch.t1_img),
            t2_img: await getImg('m-t2-file', 'm-t2-url', oldMatch.t2_img),
            card: await getImg('m-card-file', 'm-card-url', oldMatch.card),
            links, time: document.getElementById('m-time').value, isLive: document.getElementById('m-live').checked 
        }; 
        if(idx > -1) matchDatabase[idx] = mObj; else matchDatabase.push(mObj); 
        saveVault(); resetAdminForm(); refreshData(); 
    }

    function saveVault() { localStorage.setItem('matchVault', JSON.stringify(matchDatabase)); }
    function resetAdminForm() { 
        document.getElementById('edit-index').value = "-1"; document.getElementById('form-title').innerText = "Create Match Entry"; document.getElementById('save-btn').innerText = "PUSH TO CLOUD"; document.getElementById('cancel-edit-btn').style.display = "none"; document.getElementById('m-t1').value = ""; document.getElementById('m-t2').value = ""; document.getElementById('m-time').value = ""; document.getElementById('m-live').checked = false; document.getElementById('m-card-url').value = ""; document.getElementById('m-t1-url').value = ""; document.getElementById('m-t2-url').value = ""; document.getElementById('m-card-file').value = ""; document.getElementById('m-t1-file').value = ""; document.getElementById('m-t2-file').value = ""; document.getElementById('links-container').innerHTML = `<div class="link-input-group"><div class="row g-2"><div class="col-5"><input type="text" class="form-control admin-input s-name" placeholder="Server"></div><div class="col-7"><input type="text" class="form-control admin-input s-url" placeholder="URL"></div></div></div>`; renderAdminList(); 
    }

    function playStream(url, title) { closeLink(); document.getElementById('player-layer').style.display = 'block'; document.getElementById('v-title').innerText = title; if (Hls.isSupported()) { if(hls) hls.destroy(); hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); } else { video.src = url; video.play(); } }
    function closePlayer() { document.getElementById('player-layer').style.display = 'none'; video.pause(); }
    function togglePlay(e) { e.stopPropagation(); video.paused ? video.play() : video.pause(); }
    function skip(v, e) { e.stopPropagation(); video.currentTime += v; }
    function toggleFS(e) { e.stopPropagation(); if(!document.fullscreenElement) document.getElementById('v-container').requestFullscreen(); else document.exitFullscreen(); }
    function toggleLock(e) { e.stopPropagation(); isLocked = !isLocked; document.getElementById('lock-btn').className = isLocked ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open'; document.getElementById('player-controls').classList.toggle('hide', isLocked); }
    function filterData(c, btn) { currentFilter = c; document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); refreshData(); }
    
    function refreshData() { 
        let filtered = currentFilter === 'All' ? matchDatabase : matchDatabase.filter(m => m.cat === currentFilter); 
        const list = document.getElementById('match-list'); 
        list.innerHTML = filtered.map((m) => {
            const realIdx = matchDatabase.indexOf(m);
            return `<div class="match-card" onclick="openLinksFromFiltered(${realIdx})">
                ${m.card ? `<img src="${m.card}" class="m-card-img">` : '<div style="background:#222;height:100%"></div>'}
                <div class="card-overlay">
                    <div class="card-top-row"><div class="card-cat-text">${m.cat}</div></div>
                    <div class="card-mid-row">
                        <div class="team-box"><img src="${m.t1_img || ''}"><div>${m.t1}</div></div>
                        <div class="vs-text">VS</div>
                        <div class="team-box"><img src="${m.t2_img || ''}"><div>${m.t2}</div></div>
                    </div>
                    <div class="card-bottom-row">
                        ${m.isLive ? '<div class="live-tag">LIVE</div>' : `<div class="time-text">${m.time ? m.time.replace('T', ' ') : ''}</div>`}
                        <button class="watch-btn-overlay"><i class="fa-solid fa-play"></i> WATCH NOW</button>
                    </div>
                </div>
            </div>`;
        }).join(''); 
        updateCounts(); 
    }

    function openLinksFromFiltered(realIdx) { const m = matchDatabase[realIdx]; document.getElementById('link-title').innerText = m.t1 + " vs " + m.t2; document.getElementById('link-area').innerHTML = m.links.map(l => `<div class="link-row" onclick="playStream('${l.url}', '${m.t1} vs ${m.t2}')"><i class="fa-solid fa-play me-3 text-warning"></i><span>${l.name}</span></div>`).join(''); document.getElementById('link-overlay').style.display = 'block'; }
    function closeLink() { document.getElementById('link-overlay').style.display = 'none'; }
    function updateCounts() { document.getElementById('c-all').innerText = matchDatabase.length; document.getElementById('c-cricket').innerText = matchDatabase.filter(m => m.cat === 'Cricket').length; document.getElementById('c-ipl').innerText = matchDatabase.filter(m => m.cat === 'IPL').length; }
    function searchFn() { let val = document.getElementById('searchInput').value.toLowerCase(); let filtered = matchDatabase.filter(m => (m.t1.toLowerCase().includes(val) || m.t2.toLowerCase().includes(val)) && (currentFilter === 'All' || m.cat === currentFilter)); document.getElementById('match-list').innerHTML = filtered.map((m) => `<div class="match-card" onclick="openLinksFromFiltered(matchDatabase.indexOf(m))"><img src="${m.card}" class="m-card-img"><div class="card-overlay"><div class="card-top-row"><div class="card-cat-text">${m.cat}</div></div><div class="card-mid-row"><div class="team-box"><img src="${m.t1_img}"><div>${m.t1}</div></div><div class="vs-text">VS</div><div class="team-box"><img src="${m.t2_img}"><div>${m.t2}</div></div></div><div class="card-bottom-row">${m.isLive ? '<div class="live-tag">LIVE</div>' : `<div class="time-text">${m.time.replace('T', ' ')}</div>`}<button class="watch-btn-overlay"><i class="fa-solid fa-play"></i> WATCH NOW</button></div></div></div>`).join(''); }

    let startY, startV; 
    document.getElementById('left-zone').addEventListener('touchstart', e => { if(isLocked) return; startY = e.touches[0].pageY; startV = brightness; document.getElementById('bright-box').style.display='flex'; }); 
    document.getElementById('left-zone').addEventListener('touchmove', e => { if(isLocked) return; let d = (startY - e.touches[0].pageY)/150; brightness = Math.min(Math.max(startV+d, 0), 1); document.getElementById('br-mask').style.opacity = 1-brightness; document.getElementById('b-fill').style.height = (brightness*100)+'%'; }); 
    document.getElementById('right-zone').addEventListener('touchstart', e => { if(isLocked) return; startY = e.touches[0].pageY; startV = video.volume; document.getElementById('vol-box').style.display='flex'; }); 
    document.getElementById('right-zone').addEventListener('touchmove', e => { if(isLocked) return; let d = (startY - e.touches[0].pageY)/150; video.volume = Math.min(Math.max(startV+d, 0), 1); document.getElementById('v-fill').style.height = (video.volume*100)+'%'; }); 
    document.getElementById('left-zone').addEventListener('touchend', () => document.getElementById('bright-box').style.display='none');
    document.getElementById('right-zone').addEventListener('touchend', () => document.getElementById('vol-box').style.display='none');
    document.getElementById('left-zone').addEventListener('click', () => { if(!isLocked) document.getElementById('player-controls').classList.toggle('hide'); });
    document.getElementById('right-zone').addEventListener('click', () => { if(!isLocked) document.getElementById('player-controls').classList.toggle('hide'); });
    const seek = document.getElementById('seek-slider'); seek.addEventListener('input', () => { video.currentTime = (seek.value / 100) * video.duration; }); 
    video.addEventListener('timeupdate', () => { seek.value = (video.currentTime / video.duration) * 100 || 0; document.getElementById('time-lbl').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration); document.getElementById('p-play').className = video.paused ? 'fa-solid fa-play' : 'fa-solid fa-pause'; }); 
    function formatTime(s) { if(isNaN(s)) return "00:00"; const m = Math.floor(s/60), sc = Math.floor(s%60); return (m<10?'0'+m:m)+":"+(sc<10?'0'+sc:sc); }
</script>
</body>
</html>
